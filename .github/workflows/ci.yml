name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  # ─── Backend Tests ─────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: arenaverse_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/arenaverse_test

      - name: Run Prisma migrations
        run: npx prisma migrate deploy
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/arenaverse_test

      - name: Run backend tests
        run: npm run test:coverage
        working-directory: backend
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/arenaverse_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret-for-ci
          JWT_REFRESH_SECRET: test-refresh-secret-for-ci
          JWT_EXPIRY: 15m
          JWT_REFRESH_EXPIRY: 7d

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          directory: backend/coverage
          flags: backend

  # ─── Frontend Tests ────────────────────────────────────────────
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run frontend tests
        run: npm test -- --coverage --watchAll=false
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: https://placeholder.railway.app
          VITE_SOCKET_URL: https://placeholder.railway.app
          VITE_RAZORPAY_KEY_ID: placeholder
          VITE_CLOUDINARY_CLOUD_NAME: placeholder
          VITE_CLOUDINARY_UPLOAD_PRESET: placeholder

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          directory: frontend/coverage
          flags: frontend

  # ─── Lint ──────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci
        working-directory: backend
      - run: npm run lint
        working-directory: backend
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend

  # ─── E2E Tests (only on main) ──────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.ref == 'refs/heads/main'
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: arenaverse_e2e
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ['6379:6379']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install backend deps & migrate
        working-directory: backend
        run: |
          npm ci
          npx prisma migrate deploy
          npx prisma db seed
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/arenaverse_e2e
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-secret
          JWT_REFRESH_SECRET: ci-refresh
          JWT_EXPIRY: 15m
          JWT_REFRESH_EXPIRY: 7d
          SENDGRID_API_KEY: placeholder
          CLOUDINARY_CLOUD_NAME: placeholder
          CLOUDINARY_API_KEY: placeholder
          CLOUDINARY_API_SECRET: placeholder
          RAZORPAY_KEY_ID: placeholder
          RAZORPAY_KEY_SECRET: placeholder
          RAZORPAY_WEBHOOK_SECRET: placeholder
          OPENAI_API_KEY: placeholder

      - name: Start backend
        working-directory: backend
        run: npm run build && npm start &
        env:
          NODE_ENV: test
          PORT: 4000
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/arenaverse_e2e
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-secret
          JWT_REFRESH_SECRET: ci-refresh
          FRONTEND_URL: http://localhost:5173

      - name: Install frontend deps & start
        working-directory: frontend
        run: |
          npm ci
          VITE_API_URL=http://localhost:4000 VITE_SOCKET_URL=http://localhost:4000 npm run dev &
          sleep 10

      - name: Run Cypress E2E
        uses: cypress-io/github-action@v6
        with:
          working-directory: frontend
          wait-on: 'http://localhost:5173'
          wait-on-timeout: 60

  # ─── Deploy notification (info only) ───────────────────────────
  deploy-info:
    name: Deploy Info
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test, lint]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deployment triggered
        run: |
          echo "✅ All checks passed."
          echo "🚀 Vercel will auto-deploy frontend from main branch."
          echo "🚂 Railway will auto-deploy backend from main branch."
